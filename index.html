<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Word Finding</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <h1>Simple Word Finding</h1>
    <p class="tagline">A clean, fast dictionary of the English language</p>
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="Search for a word…" autocomplete="off" spellcheck="false">
      <span id="resultCount" class="result-count"></span>
    </div>
  </header>

  <main>
    <ul id="wordList" class="word-list"></ul>
    <p id="emptyState" class="empty-state" hidden>No words match "<span id="emptyQuery"></span>".</p>
  </main>

  <footer class="footer">
    <p>Simple Word Finding &middot; <span id="wordTotal"></span> words &middot; definitions via Free Dictionary API &middot; AI examples via Gemini</p>
  </footer>

<script src="dictionary-data.js"></script>
<script src="script.js"></script>
</body>
</html>
